services:
  postgres:
    image: postgres:16-alpine
    container_name: medarchive-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-medarchive}
      POSTGRES_USER: ${POSTGRES_USER:-medarchive}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-medarchive}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-medarchive} -d ${POSTGRES_DB:-medarchive}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: medarchive-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: medarchive-backend
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://medarchive:medarchive@postgres:5432/medarchive}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      STORAGE_DIR: ${STORAGE_DIR:-/app/storage}
      OCR_PROVIDER: ${OCR_PROVIDER:-auto}
      GOOGLE_VISION_LANGUAGE_HINTS_RAW: ${GOOGLE_VISION_LANGUAGE_HINTS_RAW:-ru,en}
      DOCUMENT_AI_PROJECT_ID: ${DOCUMENT_AI_PROJECT_ID:-central-trees-491011-c5}
      DOCUMENT_AI_LOCATION: ${DOCUMENT_AI_LOCATION:-us}
      DOCUMENT_AI_PROCESSOR_NAME: ${DOCUMENT_AI_PROCESSOR_NAME:-}
      DOCUMENT_AI_PROCESSOR_DISPLAY_NAME: ${DOCUMENT_AI_PROCESSOR_DISPLAY_NAME:-medarchive-pdf-ocr}
      DOCUMENT_AI_PROCESSOR_TYPE: ${DOCUMENT_AI_PROCESSOR_TYPE:-OCR_PROCESSOR}
      DOCUMENT_AI_AUTO_CREATE_PROCESSOR: ${DOCUMENT_AI_AUTO_CREATE_PROCESSOR:-true}
      DOCUMENT_AI_BATCH_PAGES: ${DOCUMENT_AI_BATCH_PAGES:-5}
      GOOGLE_APPLICATION_CREDENTIALS: ${GOOGLE_APPLICATION_CREDENTIALS:-/app/credentials/document-ai.json}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_PDF_MODEL: ${GEMINI_PDF_MODEL:-gemini-2.5-flash}
      GEMINI_PDF_BATCH_SIZE: ${GEMINI_PDF_BATCH_SIZE:-5}
      PDF_OCR_DPI: ${PDF_OCR_DPI:-220}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./storage:/app/storage
      - ./demo:/app/demo:ro
      - ./data:/app/data:ro
      - ./credentials:/app/credentials:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "uvicorn app.main:app --host 0.0.0.0 --port 8000"

  frontend:
    build:
      context: ./frontend
    container_name: medarchive-frontend
    environment:
      VITE_API_BASE_URL: http://localhost:${BACKEND_PORT:-8000}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
